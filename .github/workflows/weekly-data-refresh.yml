name: Weekly Data Refresh & Publishing

on:
  schedule:
    # Run every Monday at 12:00 PM UTC
    - cron: '0 12 * * 1'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
    - name: 🔍 Display context
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📊 Weekly Data Refresh Starting"
        echo "📝 Commit: ${GITHUB_SHA:0:7}"
        echo "👤 Triggered by: ${{ github.actor }}"
        echo "📅 Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd data_engineering
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install dbt-core dbt-duckdb

    - name: 🔄 Extract Latest Data
      env:
        CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
      run: |
        echo "📥 Extracting CDC SODA API data..."
        python data_engineering/data_sources/cdc_api/soda_extractor.py

        echo "📥 Extracting US Census demographic data..."
        python data_engineering/data_sources/census_acs/census_extractor.py

    - name: Set up dbt profiles
      run: |
        mkdir -p ~/.dbt
        cat > ~/.dbt/profiles.yml << EOF
        fentanyl_awareness:
          target: dev
          outputs:
            dev:
              type: duckdb
              path: 'fentanyl_awareness.duckdb'
              threads: 4
              schema: 'main'
        EOF

    - name: Install dbt packages
      run: |
        cd data_engineering/data_build_tool
        dbt deps --profiles-dir ~/.dbt

    - name: Load dbt seeds
      run: |
        cd data_engineering/data_build_tool
        dbt seed --profiles-dir ~/.dbt

    - name: Create Final_Datasets directory
      run: |
        mkdir -p Final_Datasets

    - name: Run dbt models
      run: |
        cd data_engineering/data_build_tool
        dbt run --profiles-dir ~/.dbt

    - name: Run dbt tests
      run: |
        cd data_engineering/data_build_tool
        dbt test --profiles-dir ~/.dbt

    - name: Generate dbt documentation
      run: |
        cd data_engineering/data_build_tool
        dbt docs generate --profiles-dir ~/.dbt

    - name: Prepare docs for GitHub Pages
      run: |
        mkdir -p docs/dbt
        cp -r data_engineering/data_build_tool/target/* docs/dbt/
        cp website/index.html docs/
        cp Final_Datasets/fact_fentanyl_deaths_over_time.csv docs/
        echo "✅ Docs ready for deployment"

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        keep_files: false

    - name: Commit Updated Data if Changed
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Track multiple files
        git add Final_Datasets/fact_fentanyl_deaths_over_time.csv
        git add data_engineering/data_build_tool/dbt/seeds/*.csv

        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "📊 No changes to data - everything is up to date"
        else
          echo "📝 Data updated - committing changes"
          git commit -m "chore: update datasets and seeds [skip ci]"
          git push origin main
        fi

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: weekly-data-refresh
        path: |
          Final_Datasets/
          data_engineering/data_build_tool/target/
        retention-days: 30

    - name: Summary
      if: always()
      run: |
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "✅ Weekly Data Refresh Complete"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📁 Updated CSV: Final_Datasets/fact_fentanyl_deaths_over_time.csv"
        echo "📚 Updated docs: https://data-science-link.github.io/fentanyl-awareness/"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
