version: 2

models:
  - name: fact_fentanyl_deaths_over_time
    description: |
      Fact table for comprehensive fentanyl deaths analysis with census demographic data.

      This model uses the CDC SODA API as its single source of truth for fentanyl-related deaths.
      It combines mortality data (12-month rolling totals) with US Census demographic and
      economic indicators to enable comprehensive analysis of fentanyl-related deaths across
      time, geography, and socioeconomic factors.

      **Data Characteristics:**
      - **Time Period**: 2015-current (as provided by CDC SODA API)
      - **Geographic Level**: State-level aggregation
      - **Cause of Death**: Synthetic opioid deaths (T40.4)
      - **Metric**: 12-month rolling total of deaths ending in the given month
      - **Demographics**: Population, income, and unemployment data from US Census

      **Key Transformations:**
      - Standardizes date and state formats from API source
      - Renames deaths to rolling_12_month_deaths for clarity
      - Enriches with census demographic and economic data

      This fact table serves as the primary dataset for comprehensive fentanyl mortality
      analysis, enabling correlation studies between death rates and socioeconomic factors.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - year
              - month
              - state

    columns:
      - name: year
        description: "Year of death occurrence"
        tests:
          - not_null

      - name: month
        description: "Date representation of the month (first day of month)"
        tests:
          - not_null

      - name: state
        description: "State where death occurred"
        tests:
          - not_null

      - name: rolling_12_month_deaths
        description: "12-month rolling total of fentanyl-related deaths"
        tests:
          - not_null

      - name: data_source
        description: "Source dataset identifier ('CDC SODA API')"
        tests:
          - not_null

      - name: population
        description: "State population count from US Census Population Estimates Program"

      - name: median_household_income
        description: "Median household income in current dollars from US Census ACS"

      - name: unemployment_rate
        description: "Unemployment rate as percentage from US Census ACS"
